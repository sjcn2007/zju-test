<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0, maximum-scale=1.0, user-scalable=no">
    <title>测测你的专属 ZJUTI</title>
    <style>
        /* --- 基础样式设计（贴合微信阅读习惯） --- */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9; /* 浅灰偏蓝背景，干净清爽 */
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px; /* 适配手机屏幕 */
            padding: 30px 20px;
            box-sizing: border-box;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* 隐藏元素的通用类 */
        .hidden { display: none !important; }

        /* --- 首页样式 --- */
        #start-screen { text-align: center; }
        .title { font-size: 26px; font-weight: bold; margin-bottom: 15px; color: #003f88; /* 浙大蓝 */ letter-spacing: 1px;}
        .subtitle { font-size: 15px; color: #666; margin-bottom: 50px; line-height: 1.6;}
        .start-btn {
            background-color: #003f88;
            color: white;
            border: none;
            padding: 16px 50px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0, 63, 136, 0.2);
            transition: 0.2s;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .start-btn:active { transform: scale(0.95); box-shadow: 0 2px 6px rgba(0, 63, 136, 0.2);}

        /* --- 答题页样式 --- */
        #question-screen { width: 100%; animation: fadeIn 0.5s ease; }
        .progress { font-size: 14px; color: #999; margin-bottom: 25px; text-align: center; font-weight: bold;}
        .question-text { font-size: 18px; font-weight: bold; margin-bottom: 35px; line-height: 1.6; color: #222;}
        .option-btn {
            display: block;
            width: 100%;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            color: #444;
            padding: 18px 20px;
            margin-bottom: 16px;
            border-radius: 12px;
            font-size: 15px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 1.5;
        }
        .option-btn:active { background-color: #e2e6ea; border-color: #dae0e5; transform: scale(0.98);}

        /* --- 结果页样式 --- */
        #result-screen { text-align: center; width: 100%; animation: fadeIn 0.8s ease;}
        .result-tip { font-size: 15px; color: #003f88; margin-bottom: 20px; font-weight: bold; animation: pulse 2s infinite;}
        #result-image {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            display: block;
            margin: 0 auto;
        }

        /* 简单动画 */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-screen">
            <div class="title">解锁你的“ZJUTI”</div>
            <div class="subtitle">百年求是，你是校园里的哪一道风景？<br>完成 20 道灵魂测试，遇见真实的自己。</div>
            <button class="start-btn" onclick="startQuiz()">开始测试</button>
        </div>

        <div id="question-screen" class="hidden">
            <div class="progress" id="progress-text">1 / 20</div>
            <div class="question-text" id="question-text">问题加载中...</div>
            <div id="options-container">
                </div>
        </div>

        <div id="result-screen" class="hidden">
            <div class="result-tip">👇 长按保存下方专属海报，分享此刻👇</div>
            <img id="result-image" src="" alt="你的测试结果正在生成...">
        </div>
    </div>

    <script>
        // --- 核心数据配置区 ---

        // 1. 初始化 9 种人格的分数池
        let scores = {
            WISER: 0, WILD: 0, CHAT: 0, SOUL: 0, TASTE: 0,
            ARTIST: 0, GLOW: 0, ANGEL: 0, LINK: 0
        };

        // 2. 配置结果海报图片路径 (注意确保你的图片名与这里一致)
        const resultImages = {
            WISER: "img/wiser.png",
            WILD: "img/wild.png",
            CHAT: "img/chat.png",
            SOUL: "img/soul.png",
            TASTE: "img/taste.png",
            ARTIST: "img/artist.png",
            GLOW: "img/glow.png",
            ANGEL: "img/angel.png",
            LINK: "img/link.png"
        };

       // 3. 题库：20题完整版（已交叉打乱顺序，并添加固定序号）
        const questions = [
            {
                question: "1. 偶然走进一家开在隐秘角落的旧物杂货铺，老板说你可以带走一样东西。你的目光最先被什么吸引？",
                options: [
                    { text: "一本没有封皮的厚重笔记，里面写满了前人密密麻麻的批注与思考。", scores: { WISER: 2, LINK: 1 } },
                    { text: "一套看起来很有年代感的陶瓷茶具，釉色温润。", scores: { TASTE: 1, ARTIST: 1 } },
                    { text: "一台有些积灰的老式唱片机，旁边散落着几张黑胶唱片。", scores: { SOUL: 2, ARTIST: 1 } },
                    { text: "一张泛黄的手绘老地图，上面标注着一些现在已经不存在的地名。", scores: { WILD: 2, WISER: 1 } }
                ]
            },
            {
                question: "2. 接近晚上十点半，寝室（或自习室）突然意外停电，周围瞬间陷入一片黑暗与短暂的安静。你的第一反应通常是？",
                options: [
                    { text: "正好还没到打卡截止时间，去操场打完卡回来说不定就好了。", scores: { GLOW: 2 } },
                    { text: "摸黑翻出手机，第一时间打开论坛或群聊，看看全校情况。", scores: { LINK: 2, CHAT: 1 } },
                    { text: "问问室友有没有充电宝，打开小台灯或手机手电筒。", scores: { ANGEL: 2, CHAT: 1 } },
                    { text: "那就早点休息叭~", scores: { SOUL: 2, CHAT: -1 } }
                ]
            },
            {
                question: "3. 如果要把你的校园生活剪辑成一部没有画面的“声音纪录片”，最不可或缺的背景音是？",
                options: [
                    { text: "很多人声的交织，比如大课间走廊上的喧闹，或聚餐时的笑声。", scores: { CHAT: 2, SOUL: -1 } },
                    { text: "单调但让人心安的声音，比如笔尖划过纸张的沙沙声。", scores: { SOUL: 2, CHAT: -0.5 } },
                    { text: "风穿过树叶的白噪音，或者是踩在秋天干燥落叶上的碎裂声。", scores: { WILD: 2, ARTIST: 1 } },
                    { text: "清晰的节拍声，比如篮球砸向地面的回弹，或演出的鼓点。", scores: { GLOW: 1, ARTIST: 1 } }
                ]
            },
            {
                question: "4. 如果你的内在能量是一种自然现象，你觉得它更接近于：",
                options: [
                    { text: "润物细无声，能在干涸时带来生机的绵绵春雨。", scores: { ANGEL: 1, SOUL: 1 } },
                    { text: "充满爆发力、能瞬间照亮夜空的雷电交加。", scores: { GLOW: 2, CHAT: 1 } },
                    { text: "极致纯粹、能穿透一切迷雾的凛冽冬日晨霜。", scores: { SOUL: 1, ARTIST: 0.5 } },

                    { text: "决定去打卡那家一直想去但平时排队太长的校园周边宝藏小吃店。", scores: { TASTE: 2.5 } },

                    { text: "双手轻轻揉捏一只温热、柔软、充满活力的小猫。", scores: { ANGEL: 1, SOUL: 0.5 } },

            {

                    { text: "没有棱角、柔和起伏且没有尽头的波浪线。", scores: { WILD: 1 } },

            },
            {
                question: "8. 毕业季或期末搬寝室，在兵荒马乱的打包现场，你通常是哪种状态？",
                options: [
                    { text: "翻出旧物时被细节吸引，忍不住开始给舍友重温这些物件背后的故事。", scores: { CHAT: 1, ARTIST: 0.5 } },
                    { text: "早就列好了完美的打包清单，甚至对比了三家快递公司的性价比。", scores: { LINK: 2, WISER: 0.5 } },

                ]
            },
            {
                question: "9. 什么样的味觉层次，最能代表你心目中“完美的一天”？",
                options: [
                    { text: "初尝平淡，但回味绵长、让人忍不住反复咀嚼的醇厚甘甜。", scores: { TASTE: 0.5, SOUL: 0.5 } },
                    { text: "像碳酸气泡在舌尖炸开，清新、明快且充满活力的酸甜果味。", scores: { TASTE:0.5, GLOW: 0.5 } },
                    { text: "入口苦涩，但融化后带着丰富层次和香气的茶香味。", scores: { GLOW: 0.5, TASTE: 1 } },

                ]
            },
            {
                question: "10. 桌上有四瓶来历不明的“魔法药水”，仅凭外观，你会选择喝下：",

                    { text: "随着光线角度不同，一直在变幻颜色的神秘液体。", scores: { LINK: 1, ARTIST: 1 } },

                    { text: "色彩明快、触感奇特的编织布面，拿在手里就有好心情。", scores: { ANGEL:0.5, ARTIST: 1 } },

                    { text: "站在一个没有剧本的舞台上，灯光亮起，一切全凭你即兴发挥。", scores: { ARTIST: 2, CHAT: 1 } }
                ]
            }
        ];

        // --- 逻辑控制区 ---
        let currentQuestionIndex = 0;

        // 点击开始
        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            renderQuestion();
        }

        // 渲染题目
        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ''; // 清空上一题的选项

            q.options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.innerText = option.text;
                // 将该选项的多重分数对象传给点击事件
                button.onclick = () => handleOptionClick(option.scores);
                optionsContainer.appendChild(button);
            });
        }

        // 处理选项点击与加分
        function handleOptionClick(optionScores) {
            // 遍历当前选项的 scores 对象，给对应的人格加上指定的分数
            for (const [personality, points] of Object.entries(optionScores)) {
                if (scores[personality] !== undefined) {
                    scores[personality] += points;
                }
            }
            
            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                renderQuestion(); // 渲染下一题
            } else {
                showResult(); // 没题了，计算最终结果
            }
        }

        // 计算结果并展示
        function showResult() {
            let maxScore = -1;
            let topPersonalities = []; 

            // 1. 遍历分数对象，找出最高分（可能存在平局）
            for (const [personality, score] of Object.entries(scores)) {
                if (score > maxScore) {
                    maxScore = score;
                    topPersonalities = [personality]; // 发现更高的分数，重置最高分数组
                } else if (score === maxScore) {
                    topPersonalities.push(personality); // 如果分数一样，加入平局数组
                }
            }

            // 2. 平局打破机制：如果出现并列第一，随机抽取一个作为最终结果
            const randomInx = Math.floor(Math.random() * topPersonalities.length);
            const finalPersonality = topPersonalities[randomInx];

            // 3. 切换页面展示结果图
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('result-image').src = resultImages[finalPersonality];
        }
    </script>
</body>
