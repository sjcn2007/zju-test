<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>测测你的专属ZJUer人格图鉴</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9; color: #333;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 600px; padding: 30px 20px; box-sizing: border-box;
            background: #fff; min-height: 100vh; display: flex; flex-direction: column;
            justify-content: center; box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }
        .hidden { display: none !important; }
        #start-screen { text-align: center; }
        .title { font-size: 26px; font-weight: bold; margin-bottom: 15px; color: #003f88; letter-spacing: 1px;}
        .subtitle { font-size: 15px; color: #666; margin-bottom: 50px; line-height: 1.6;}
        .start-btn {
            background-color: #003f88; color: white; border: none; padding: 16px 50px;
            font-size: 18px; border-radius: 30px; cursor: pointer;
            box-shadow: 0 6px 12px rgba(0, 63, 136, 0.2); transition: 0.2s; font-weight: bold; letter-spacing: 2px;
        }
        .start-btn:active { transform: scale(0.95); box-shadow: 0 2px 6px rgba(0, 63, 136, 0.2);}
        
        /* 题目容器：加入过渡动画支持 */
        #question-screen { 
            width: 100%; 
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 1;
            transform: translateY(0);
        }
        /* 淡出状态 */
        #question-screen.fade-out {
            opacity: 0;
            transform: translateY(-10px);
        }
        /* 淡入状态 */
        #question-screen.fade-in {
            opacity: 0;
            transform: translateY(10px);
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .back-btn { background: none; border: none; color: #003f88; font-size: 15px; cursor: pointer; padding: 5px 10px; font-weight: bold; margin-left: -10px; }
        .back-btn:active { opacity: 0.6; }
        .progress { font-size: 14px; color: #999; font-weight: bold;}
        .spacer { width: 60px; }
        .question-text { font-size: 18px; font-weight: bold; margin-bottom: 35px; line-height: 1.6; color: #222;}
        
        /* 优化选项按钮的初始状态与过渡 */
        .option-btn {
            display: block; width: 100%; background-color: #f8f9fa; border: 1px solid #e9ecef; color: #444;
            padding: 18px 20px; margin-bottom: 16px; border-radius: 12px; font-size: 15px; text-align: left;
            cursor: pointer; transition: all 0.3s ease; line-height: 1.5;
        }
        /* 未被选中的选项在点击后的淡出效果 */
        .option-btn.fade-others {
            opacity: 0.4;
            transform: scale(0.98);
        }
        /* 被选中选项的渐变蓝色效果 */
        .option-btn.selected {
            background: linear-gradient(135deg, #003f88, #0056b3);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 12px rgba(0, 63, 136, 0.15);
            transform: scale(1.02);
        }

        #result-screen { text-align: center; width: 100%; animation: fadeIn 0.8s ease;}
        .result-tip { font-size: 15px; color: #003f88; margin-bottom: 20px; font-weight: bold; animation: pulse 2s infinite;}
        #result-image { width: 100%; max-width: 400px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); display: block; margin: 0 auto; }
        
        /* 结果页底部声明样式 */
        .footer-text {
            font-size: 12px;
            color: #999;
            margin-top: 35px;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    </style>
</head>

                options: [

                    { text: "刷论坛和各种新消息。", scores: { LINK: 2, TASTE: 1 } },

                options: [

                    { text: "上台演出结束后响起的掌声。", scores: { ARTIST: 2, ANGEL: 1 } },

                    { text: "发现隐藏线索的人。", scores: { WISER: 2, ARTIST: 1 } },
                    { text: "始终陪伴大家的人。", scores: { ANGEL: 2, NATURER: 1 } }
                ]
            },
            {
                question: "20. 最后，如果把关于青春的感知留在一种气味里，哪一种最能激起你的“普鲁斯特效应”？",
                options: [
                    { text: "暴雨过后，泥土、青草和沥青混合在一起的那种潮湿的“土腥味”。", scores: { NATURER: 2, ARTIST: 1 } },
                    { text: "冬日夜晚，从小推车里飘出来的、裹挟着孜然或黄油的浓烈香气。", scores: { TASTE: 2, WISER: 1 } },
                    { text: "拆开新书时那种带着油墨的味道。", scores: { WISER: 2, SPORT: 1 } },
                    { text: "在剧烈运动过后，喉腔中带有血腥味的空气。", scores: { SPORT: 2, NATURER: 1 } }
                ]

        ];

        let currentQuestionIndex = 0;

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            const backBtn = document.getElementById('back-btn');
            if (currentQuestionIndex === 0) { backBtn.classList.add('hidden'); } 
            else { backBtn.classList.remove('hidden'); }

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ''; 

            q.options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.innerText = option.text;
                // 将当前选项对应的按钮和分数传给处理函数
                button.onclick = (e) => handleOptionClick(button, option.scores);
                optionsContainer.appendChild(button);
            });
        }

        function handleOptionClick(selectedButton, optionScores) {
            if (isTransitioning) return; // 如果正在播放切题动画，拒绝本次点击
            isTransitioning = true;

            // 1. 展现选中后的蓝色渐变与非选中选项的淡出效果
            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(btn => {
                if (btn === selectedButton) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.add('fade-others');
                }
            });

            // 2. 稍微保留一点时间（350ms）供用户看清选中效果，随后让整道题淡出
            setTimeout(() => {
                const screen = document.getElementById('question-screen');
                screen.classList.add('fade-out');

                // 3. 题目完全淡出后（再过300ms），计分、切题并重新淡入
                setTimeout(() => {
                    scoreHistory.push(optionScores);
                    for (const [personality, points] of Object.entries(optionScores)) {
                        if (scores[personality] !== undefined) { scores[personality] += points; }
                    }
                    currentQuestionIndex++;

                    if (currentQuestionIndex < questions.length) {
                        // 初始化下一题的淡入准备姿态
                        screen.classList.remove('fade-out');
                        screen.classList.add('fade-in');
                        
                        renderQuestion();

                        // 触发浏览器的重绘，使 fade-in 的过渡生效
                        screen.offsetWidth; 
                        screen.classList.remove('fade-in');
                        isTransitioning = false;
                    } else {
                        showResult();
                    }
                }, 300);
            }, 350);
        }

        function goBack() {
            if (currentQuestionIndex > 0 && !isTransitioning) {
                isTransitioning = true;
                const screen = document.getElementById('question-screen');
                
                // 返回上一题也做平滑的淡出淡入处理
                screen.classList.add('fade-out');

                setTimeout(() => {
                    const lastScores = scoreHistory.pop();
                    for (const [personality, points] of Object.entries(lastScores)) {
                        if (scores[personality] !== undefined) { scores[personality] -= points; }
                    }
                    currentQuestionIndex--;
                    
                    screen.classList.remove('fade-out');
                    screen.classList.add('fade-in');
                    
                    renderQuestion();
                    
                    screen.offsetWidth;
                    screen.classList.remove('fade-in');
                    isTransitioning = false;
                }, 300);
            }
        }

        function showResult() {
            let maxScore = -1;
            let topPersonalities = []; 

            for (const [personality, score] of Object.entries(scores)) {
                if (score > maxScore) {
                    maxScore = score;
                    topPersonalities = [personality]; 
                } else if (score === maxScore) {
                    topPersonalities.push(personality); 
                }
            }
            
            const randomInx = Math.floor(Math.random() * topPersonalities.length);
            const finalPersonality = topPersonalities[randomInx];

            document.getElementById('question-screen').classList.add('hidden');
            // 清除可能残留的 CSS 状态类，确保未来复用或排版正常
            document.getElementById('question-screen').classList.remove('fade-out', 'fade-in');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('result-image').src = resultImages[finalPersonality];
            isTransitioning = false;
        }
    </script>
</body>
</html>
